name: CI and Publish

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Run integration tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test tools
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio httpx
          pip install -r requirements.txt

      - name: Create CI env file
        run: |
          cat > .env.docker << 'EOF'
          DB_NAME=moja_baza
          DB_USER=moj_uzytkownik
          DB_PASSWORD=ci_test_db_password
          DB_HOST=postgres
          DB_PORT=5432

          ADMIN_DB_NAME=postgres
          ADMIN_DB_USER=postgres
          ADMIN_DB_PASSWORD=ci_admin_db_password
          ADMIN_DB_HOST=postgres
          ADMIN_DB_PORT=5432

          SECRET_KEY=CI_SECRET_KEY_FOR_TESTS_ONLY_CHANGE_IN_PROD
          ALGORITHM=HS256
          ACCESS_TOKEN_EXPIRE_MINUTES=30
          REFRESH_TOKEN_EXPIRE_DAYS=7

          REDIS_HOST=redis
          REDIS_PORT=6379
          REDIS_CELERY_DB=0
          REDIS_SSE_DB=1
          REDIS_LIMITER_DB=2

          CSV_WATCH_ENABLED=true
          CSV_WATCH_DIRECTORY=/data/imports_input
          CSV_WATCH_INTERVAL_SECONDS=30
          CSV_WATCH_IMPORT_USER=watcher_ci
          EOF
          cp .env.docker .env

      - name: Build and start Docker stack
        run: |
          docker compose up -d --build

      - name: Wait for API readiness
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:8000/openapi.json > /dev/null; then
              echo "API is ready"
              exit 0
            fi
            sleep 2
          done
          echo "API did not become ready in time"
          docker compose ps
          docker logs data_server_app || true
          exit 1

      - name: Run core test suite
        run: |
          pytest tests/test_auth.py tests/test_crud.py tests/test_imports.py -v

      - name: Show logs on failure
        if: failure()
        run: |
          docker compose ps
          docker logs data_server_app || true
          docker logs data_server_postgres || true
          docker logs data_server_redis || true

      - name: Stop Docker stack
        if: always()
        run: |
          docker compose down

  publish:
    name: Publish Docker image to GHCR
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
